services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smoke
      POSTGRES_USER: smoke
      POSTGRES_PASSWORD: smoke
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smoke -d smoke"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./frontend
    environment:
      DATABASE_URL: postgresql://smoke:smoke@db:5432/smoke
      NOOPS_POSTGRES_URL: postgresql://smoke:smoke@db:5432/smoke
    ports:
      - "13000:3000"
    depends_on:
      db:
        condition: service_healthy
